<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Receipt Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    padding: 32px 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 24px;
    color: #1a1a1a;
  }
  .badge {
    display: inline-block;
    background: #fff3cd;
    border: 1px solid #ffc107;
    color: #856404;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 100px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e0e0e0;
    padding: 24px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: #444;
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 14px;
    outline: none;
    color: #1a1a1a;
  }
  input:focus, select:focus { border-color: #3b5bdb; }
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 10px;
  }
  .btn-primary   { background: #1a1a1a; color: #fff; }
  .btn-success   { background: #27ae60; color: #fff; }
  .btn-danger    { background: #c0392b; color: #fff; }
  .btn-ghost     { background: transparent; border: 1.5px solid #ddd; color: #555; }
  .hint {
    font-size: 12px;
    color: #aaa;
    margin-top: -10px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }
  .scenario-btn {
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    background: #fafafa;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 8px;
    transition: all 0.15s;
  }
  .scenario-btn:hover { border-color: #3b5bdb; background: #f0f4ff; }
  .scenario-btn .s-title { font-size: 13px; font-weight: 700; color: #1a1a1a; }
  .scenario-btn .s-desc  { font-size: 12px; color: #888; margin-top: 2px; }
  .scenario-btn .s-tag   {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px; margin-left: 6px;
    vertical-align: middle;
  }
  .tag-pass  { background: #d4edda; color: #155724; }
  .tag-fail  { background: #f8d7da; color: #721c24; }
  .tag-part  { background: #fff3cd; color: #856404; }

  /* Canvas receipt */
  canvas {
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: block;
    width: 100%;
    height: auto;
  }
  .canvas-wrap {
    position: relative;
    margin-top: 4px;
  }
  .download-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    text-decoration: none;
  }
  .info-box {
    background: #f0f4ff;
    border: 1px solid #d0dbff;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #3b5bdb;
    line-height: 1.6;
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>🧪 Test Receipt Generator <span class="badge">Dev Tool</span></h1>

<div class="container">

  <!-- LEFT: Controls -->
  <div>
    <!-- Quick Scenarios -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-title">⚡ Quick Test Scenarios</div>

      <button class="scenario-btn" onclick="applyScenario('pass')">
        <div class="s-title">✅ Perfect Match <span class="s-tag tag-pass">SHOULD VERIFY</span></div>
        <div class="s-desc">Correct amount + correct REF code. Auto-verify should succeed.</div>
      </button>

      <button class="scenario-btn" onclick="applyScenario('wrong_amount')">
        <div class="s-title">❌ Wrong Amount <span class="s-tag tag-fail">SHOULD FAIL</span></div>
        <div class="s-desc">REF code correct but amount is wrong. Manual review needed.</div>
      </button>

      <button class="scenario-btn" onclick="applyScenario('wrong_ref')">
        <div class="s-title">❌ Wrong REF Code <span class="s-tag tag-fail">SHOULD FAIL</span></div>
        <div class="s-desc">Amount correct but reference code is wrong.</div>
      </button>

      <button class="scenario-btn" onclick="applyScenario('partial')">
        <div class="s-title">⚠ Both Wrong <span class="s-tag tag-fail">SHOULD FAIL</span></div>
        <div class="s-desc">Neither amount nor REF code matches. Tests full manual flow.</div>
      </button>

      <button class="scenario-btn" onclick="applyScenario('noisy')">
        <div class="s-title">📷 Noisy Receipt <span class="s-tag tag-part">TESTS OCR</span></div>
        <div class="s-desc">Correct data but with extra noise/text. Tests OCR extraction.</div>
      </button>
    </div>

    <!-- Custom Values -->
    <div class="card">
      <div class="card-title">⚙ Custom Receipt Values</div>

      <label>Reference Code</label>
      <input id="inp-ref" type="text" value="REF5026" placeholder="e.g. REF5026"/>

      <label>Amount (LKR)</label>
      <input id="inp-amount" type="number" value="1499" placeholder="e.g. 1499"/>

      <label>Date</label>
      <input id="inp-date" type="text" value="" id="inp-date"/>

      <label>Bank Name</label>
      <select id="inp-bank">
        <option value="Commercial Bank">Commercial Bank</option>
        <option value="Peoples Bank">Peoples Bank</option>
        <option value="Sampath Bank">Sampath Bank</option>
        <option value="HNB Bank">HNB Bank</option>
        <option value="BOC Bank">BOC Bank</option>
        <option value="Seylan Bank">Seylan Bank</option>
      </select>

      <label>Receipt Style</label>
      <select id="inp-style">
        <option value="bank">Bank Slip (clean)</option>
        <option value="mobile">Mobile Banking Screenshot</option>
        <option value="atm">ATM Receipt</option>
      </select>

      <label>Noise Level</label>
      <select id="inp-noise">
        <option value="0">None — crystal clear</option>
        <option value="1">Light — minor marks</option>
        <option value="2">Medium — realistic scan</option>
        <option value="3">Heavy — hard to read</option>
      </select>

      <button class="btn btn-primary" onclick="generate()">Generate Receipt</button>
    </div>
  </div>

  <!-- RIGHT: Preview -->
  <div class="card">
    <div class="card-title">📄 Receipt Preview</div>
    <div class="canvas-wrap">
      <canvas id="receiptCanvas" width="520" height="720"></canvas>
    </div>
    <a id="downloadLink" class="download-btn" download="test-receipt.png">
      ⬇ Download as PNG
    </a>
    <div class="info-box">
      💡 Download this image and upload it in the <strong>PaymentReceipt</strong> page to test OCR verification.
      The reference code and amount are embedded so OCR should extract them correctly.
    </div>
  </div>
</div>

<script>
// ── Set today's date as default ──────────────────────────────────────────────
const today = new Date();
const dd = String(today.getDate()).padStart(2,'0');
const mm = String(today.getMonth()+1).padStart(2,'0');
const yyyy = today.getFullYear();
document.getElementById('inp-date').value = `${dd}/${mm}/${yyyy}`;

// ── Scenarios ────────────────────────────────────────────────────────────────
function applyScenario(type) {
  const baseRef    = document.getElementById('inp-ref').value || 'REF5026';
  const baseAmount = document.getElementById('inp-amount').value || '1499';

  switch(type) {
    case 'pass':
      document.getElementById('inp-ref').value    = baseRef;
      document.getElementById('inp-amount').value = baseAmount;
      document.getElementById('inp-noise').value  = '0';
      break;
    case 'wrong_amount':
      document.getElementById('inp-ref').value    = baseRef;
      document.getElementById('inp-amount').value = Math.floor(parseFloat(baseAmount) * 1.5);
      document.getElementById('inp-noise').value  = '0';
      break;
    case 'wrong_ref':
      document.getElementById('inp-ref').value    = 'REF9999';
      document.getElementById('inp-amount').value = baseAmount;
      document.getElementById('inp-noise').value  = '0';
      break;
    case 'partial':
      document.getElementById('inp-ref').value    = 'REF0000';
      document.getElementById('inp-amount').value = '100';
      document.getElementById('inp-noise').value  = '0';
      break;
    case 'noisy':
      document.getElementById('inp-ref').value    = baseRef;
      document.getElementById('inp-amount').value = baseAmount;
      document.getElementById('inp-noise').value  = '2';
      break;
  }
  generate();
}

// ── Draw receipt on canvas ────────────────────────────────────────────────────
function generate() {
  const ref    = document.getElementById('inp-ref').value.trim().toUpperCase() || 'REF5026';
  const amount = parseFloat(document.getElementById('inp-amount').value) || 1499;
  const date   = document.getElementById('inp-date').value || `${dd}/${mm}/${yyyy}`;
  const bank   = document.getElementById('inp-bank').value;
  const style  = document.getElementById('inp-style').value;
  const noise  = parseInt(document.getElementById('inp-noise').value);

  const canvas = document.getElementById('receiptCanvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = 520;
  canvas.height = 760;

  if      (style === 'bank')   drawBankSlip(ctx, canvas, ref, amount, date, bank, noise);
  else if (style === 'mobile') drawMobileReceipt(ctx, canvas, ref, amount, date, bank, noise);
  else                         drawAtmReceipt(ctx, canvas, ref, amount, date, bank, noise);

  addNoise(ctx, canvas, noise);

  // Update download link
  const link = document.getElementById('downloadLink');
  link.href = canvas.toDataURL('image/png');
}

// ── Bank Slip ─────────────────────────────────────────────────────────────────
function drawBankSlip(ctx, canvas, ref, amount, date, bank, noise) {
  const W = canvas.width, H = canvas.height;

  // Background
  ctx.fillStyle = '#fffef8';
  ctx.fillRect(0, 0, W, H);

  // Top stripe
  ctx.fillStyle = '#1a3c6e';
  ctx.fillRect(0, 0, W, 90);

  // Bank logo area
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Arial';
  ctx.fillText(bank.toUpperCase(), 30, 45);
  ctx.font = '13px Arial';
  ctx.fillStyle = '#aac4e8';
  ctx.fillText('INTERNET BANKING — FUND TRANSFER', 30, 68);

  // SUCCESS stamp
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(W-130, 20, 100, 48, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('✓ SUCCESS', W-80, 50);
  ctx.textAlign = 'left';

  let y = 130;
  const rows = [
    ['Transaction Date',  date],
    ['Transaction Time',  '14:32:07'],
    ['Transaction Type',  'Fund Transfer'],
    ['From Account',      '000' + Math.floor(Math.random()*9000000+1000000)],
    ['To Account',        '8000123456'],
    ['Beneficiary Name',  'BODIMA PAYMENTS'],
    ['Bank',              bank],
    ['Branch',            'NEGOMBO'],
    ['Amount (LKR)',      amount.toLocaleString('en-US', {minimumFractionDigits:2})],
    ['Reference / Remark', ref],
    ['Transaction ID',    'TXN' + Math.floor(Math.random()*900000+100000)],
    ['Status',            'COMPLETED'],
  ];

  rows.forEach(([k, v], i) => {
    const rowBg = i % 2 === 0 ? '#f9f9f4' : '#fff';
    ctx.fillStyle = rowBg;
    ctx.fillRect(20, y-20, W-40, 36);

    ctx.fillStyle = '#888';
    ctx.font = '13px Arial';
    ctx.fillText(k, 36, y);

    ctx.fillStyle = (k.includes('Amount') || k.includes('Reference')) ? '#1a3c6e' : '#1a1a1a';
    ctx.font = (k.includes('Amount') || k.includes('Reference')) ? 'bold 14px Arial' : '13px Arial';
    ctx.fillText(v, W/2, y);
    y += 36;
  });

  // Bottom border
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, 110, W-40, y-90);

  // Footer
  ctx.fillStyle = '#aaa';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('This is a computer-generated receipt. No signature required.', W/2, y+30);
  ctx.fillText(`Printed: ${date} 14:32:08`, W/2, y+48);
  ctx.textAlign = 'left';
}

// ── Mobile Banking Receipt ────────────────────────────────────────────────────
function drawMobileReceipt(ctx, canvas, ref, amount, date, bank, noise) {
  const W = canvas.width, H = canvas.height;

  // Phone-like background
  ctx.fillStyle = '#f0f2f5';
  ctx.fillRect(0, 0, W, H);

  // White card
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(30, 30, W-60, H-60, 18);
  ctx.fill();

  // Header
  ctx.fillStyle = '#0077b6';
  ctx.beginPath();
  ctx.roundRect(30, 30, W-60, 100, [18, 18, 0, 0]);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${bank}`, W/2, 75);
  ctx.font = '13px Arial';
  ctx.fillStyle = '#b3d9f2';
  ctx.fillText('Transfer Successful', W/2, 98);
  ctx.textAlign = 'left';

  // Big tick
  ctx.fillStyle = '#e8f8ee';
  ctx.beginPath();
  ctx.arc(W/2, 175, 38, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#27ae60';
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('✓', W/2, 187);

  // Amount big
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 34px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`LKR ${amount.toLocaleString('en-US', {minimumFractionDigits:2})}`, W/2, 255);

  // Ref code big
  ctx.fillStyle = '#0077b6';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(ref, W/2, 285);
  ctx.fillStyle = '#aaa';
  ctx.font = '11px Arial';
  ctx.fillText('Transfer Reference', W/2, 303);
  ctx.textAlign = 'left';

  // Divider
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(50, 320); ctx.lineTo(W-50, 320); ctx.stroke();

  let y = 355;
  const rows = [
    ['Date',         date],
    ['Time',         '14:32:07'],
    ['To',           'BODIMA PAYMENTS'],
    ['Account',      '8000123456'],
    ['Bank',         bank],
    ['Note',         ref],
    ['Txn ID',       'TXN'+Math.floor(Math.random()*900000+100000)],
  ];
  rows.forEach(([k, v]) => {
    ctx.fillStyle = '#aaa';
    ctx.font = '12px Arial';
    ctx.fillText(k, 55, y);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '13px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(v, W-55, y);
    ctx.textAlign = 'left';
    y += 34;

    ctx.strokeStyle = '#f8f8f8';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(50, y-12); ctx.lineTo(W-50, y-12); ctx.stroke();
  });

  ctx.fillStyle = '#ccc';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`${bank} Mobile Banking  •  ${date}`, W/2, H-45);
  ctx.textAlign = 'left';
}

// ── ATM Thermal Receipt ───────────────────────────────────────────────────────
function drawAtmReceipt(ctx, canvas, ref, amount, date, bank, noise) {
  const W = canvas.width, H = canvas.height;

  // Cream thermal paper
  ctx.fillStyle = '#fdfaf4';
  ctx.fillRect(0, 0, W, H);

  // Thermal print lines effect
  for (let y2 = 0; y2 < H; y2 += 3) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.015})`;
    ctx.fillRect(0, y2, W, 1);
  }

  ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';

  ctx.font = 'bold 16px Courier New';
  ctx.fillText('* ' + bank.toUpperCase() + ' *', W/2, 55);
  ctx.font = '13px Courier New';
  ctx.fillText('ATM FUND TRANSFER RECEIPT', W/2, 80);
  ctx.fillText('================================', W/2, 100);

  const rows = [
    ['DATE',    date],
    ['TIME',    '14:32:07'],
    ['TYPE',    'TRANSFER'],
    ['FROM',    '****' + Math.floor(Math.random()*9000+1000)],
    ['TO',      '****3456'],
    ['BENE',    'BODIMA PAYMENTS'],
    ['AMOUNT',  'LKR ' + amount.toLocaleString()],
    ['REF',     ref],
    ['STATUS',  'APPROVED'],
    ['AUTH',    Math.floor(Math.random()*900000+100000).toString()],
  ];

  let y = 130;
  ctx.textAlign = 'left';
  ctx.font = '14px Courier New';
  rows.forEach(([k, v]) => {
    const pad = 10 - k.length;
    const label = k + ' '.repeat(pad) + ':';

    ctx.fillStyle = '#555';
    ctx.fillText(label, 40, y);
    ctx.fillStyle = (k === 'AMOUNT' || k === 'REF') ? '#000' : '#333';
    ctx.font = (k === 'AMOUNT' || k === 'REF') ? 'bold 15px Courier New' : '14px Courier New';
    ctx.fillText(v, 220, y);
    ctx.font = '14px Courier New';
    y += 38;
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '13px Courier New';
  ctx.fillText('================================', W/2, y+10);
  ctx.fillText('THANK YOU FOR BANKING WITH US', W/2, y+35);
  ctx.fillText('KEEP THIS RECEIPT FOR YOUR', W/2, y+55);
  ctx.fillText('RECORDS', W/2, y+75);
  ctx.textAlign = 'left';
}

// ── Add visual noise ──────────────────────────────────────────────────────────
function addNoise(ctx, canvas, level) {
  if (level === 0) return;
  const W = canvas.width, H = canvas.height;
  const imageData = ctx.getImageData(0, 0, W, H);
  const data = imageData.data;
  const intensity = [0, 15, 35, 65][level];

  for (let i = 0; i < data.length; i += 4) {
    const n = (Math.random() - 0.5) * intensity;
    data[i]   = Math.min(255, Math.max(0, data[i]   + n));
    data[i+1] = Math.min(255, Math.max(0, data[i+1] + n));
    data[i+2] = Math.min(255, Math.max(0, data[i+2] + n));
  }
  ctx.putImageData(imageData, 0, 0);

  // Add random smudge marks for heavy noise
  if (level >= 2) {
    for (let i = 0; i < level * 4; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.06})`;
      ctx.beginPath();
      ctx.ellipse(
        Math.random()*W, Math.random()*H,
        Math.random()*40+5, Math.random()*8+2,
        Math.random()*Math.PI, 0, Math.PI*2
      );
      ctx.fill();
    }
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
generate();
</script>
</body>
</html>
